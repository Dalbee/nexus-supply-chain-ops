name: dbt_CI_CD_Governance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install dbt-databricks
          dbt deps

      - name: Verify dbt Project
        run: dbt parse # This checks if your YAML and SQL are valid without needing the database