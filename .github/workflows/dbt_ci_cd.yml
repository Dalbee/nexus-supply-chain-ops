name: dbt_CI_CD_Governance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install dbt-databricks
          dbt deps

      - name: Authenticate and Verify
        env:
          DBT_HOST: ${{ secrets.DBT_HOST }}
          DBT_HTTP_PATH: ${{ secrets.DBT_HTTP_PATH }}
          DBT_TOKEN: ${{ secrets.DBT_TOKEN }}
        run: |
          # 1. Create the directory
          mkdir -p ~/.dbt
          
          # 2. Generate the profile file using the secrets
          # Match the ID character-for-character with dbt_project.yml
          echo "nexus_supply_chain_ops: 
            outputs:
              dev:
                type: databricks
                catalog: workspace
                schema: supply_chain_analytics
                host: $DBT_HOST
                http_path: $DBT_HTTP_PATH
                token: $DBT_TOKEN
                threads: 1
            target: dev" > ~/.dbt/profiles.yml
          
          # 3. Run dbt commands in the SAME step so the environment is shared
          dbt debug --profiles-dir ~/.dbt
          dbt parse --profiles-dir ~/.dbt